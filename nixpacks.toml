# nixpacks.toml
# Railway build config for the yt-dlp FastAPI server.
# Needs both python and node providers:
#   - python  → FastAPI, yt-dlp
#   - node    → the JS runtime yt-dlp uses to solve YouTube's n-challenge (required since yt-dlp 2025.11.12)
#
# ffmpeg is required for merging bestvideo+bestaudio streams.

providers = ["python", "node"]

[phases.setup]
nixPkgs = [
  "pkgs.python312",
  "pkgs.nodejs_22",   # node >=20 required; 22 is current LTS
  "pkgs.ffmpeg",
]

[phases.install]
cmds = [
  # yt-dlp[default] pulls in yt-dlp-ejs — the JS bundle yt-dlp needs to
  # operate the node runtime for YouTube's JS challenge solver.
  "pip install -r requirements.txt",
]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"
